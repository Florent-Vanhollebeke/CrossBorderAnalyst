# ============================================
# CrossBorder Analyst — Docker Compose
# Usage dev local : docker compose up --build
# ============================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crossborderanalyst-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      # Hot-reload en dev : monter le code source
      - ./backend/app:/app/app:ro
      - ./backend/data:/app/data:ro
      - ./backend/ml_models:/app/ml_models:ro
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: crossborderanalyst-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
